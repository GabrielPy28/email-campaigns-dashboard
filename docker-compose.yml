version: "3.9"

services:
  api:
    build: .
    container_name: email_campaigns_api
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLIC_KEY=${SUPABASE_PUBLIC_KEY}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: email_campaigns_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=email_campaigns
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: email_campaigns_redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: email_campaigns_worker
    command: celery -A worker.celery_app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  beat:
    build: .
    container_name: email_campaigns_beat
    command: celery -A worker.celery_app.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app

  frontend:
    image: node:20-alpine
    container_name: email_campaigns_frontend
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - NODE_ENV=development

volumes:
  pgdata:
  app_logs:

