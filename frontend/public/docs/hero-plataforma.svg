<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Ilustración plataforma">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff"/>
      <stop offset="50%" style="stop-color:#f5f3ff"/>
      <stop offset="100%" style="stop-color:#fdf4ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#0f172a">Flujo de la plataforma</text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Listas ? Plantillas &amp; Senders ? Campańas ? Métricas</text>
  <g transform="translate(80,120)">
    <rect x="0" y="0" width="200" height="140" rx="16" fill="url(#card)" stroke="#e2e8f0" stroke-width="2"/>
    <text x="100" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#4f46e5">Audiencia</text>
    <text x="100" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Listas · Creadores</text>
    <text x="100" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Segmentación</text>
    <path d="M200 70 L260 70" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  </g>
  <g transform="translate(340,120)">
    <rect x="0" y="0" width="200" height="140" rx="16" fill="url(#card)" stroke="#e2e8f0" stroke-width="2"/>
    <text x="100" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#0ea5e9">Contenido</text>
    <text x="100" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Plantillas HTML</text>
    <text x="100" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Senders</text>
    <path d="M200 70 L260 70" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  </g>
  <g transform="translate(600,120)">
    <rect x="0" y="0" width="200" height="140" rx="16" fill="url(#card)" stroke="#c4b5fd" stroke-width="2"/>
    <text x="100" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#7c3aed">Campańas</text>
    <text x="100" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Programación</text>
    <text x="100" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Envío y cola</text>
    <path d="M200 70 L260 70" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  </g>
  <g transform="translate(860,120)">
    <rect x="0" y="0" width="260" height="140" rx="16" fill="url(#card)" stroke="#e2e8f0" stroke-width="2"/>
    <text x="130" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#db2777">Resultados</text>
    <text x="130" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Aperturas · Clics · Informes</text>
    <text x="130" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Excel / CSV</text>
  </g>
</svg>
